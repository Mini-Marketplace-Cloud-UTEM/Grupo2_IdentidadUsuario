name: CI E3 - Pruebas Automatizadas

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Mantenemos el Postgres temporal de fondo por si main.py conecta a la BD
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_USER: test_user
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Descargar código fuente
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        # Instalamos directo porque requirements.txt está en la raíz
        pip install -r requirements.txt

    - name: Levantar Identity Service (main.py)
      env:
        DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/marketplace_test"
      run: |
        # Ejecutamos directo main:app en minúscula y sin 'cd' previos
        uvicorn main:app --host 127.0.0.1 --port 3000 &
        sleep 5

    # NOTA: Si en este repositorio vas a meter el script 'test_e2e.sh' en la raíz, 
    # descomenta las líneas de abajo quitándoles el '#' para que corra el test:
    # - name: Ejecutar Suite de Pruebas E2E
    #   run: |
    #     bash test_e2e.sh
